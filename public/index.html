<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomuVPN — Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Kanit', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
}
.neon {
    box-shadow: 0 0 20px rgba(59,130,246,0.4),
                0 0 40px rgba(59,130,246,0.2);
}
.gradient-text {
    background: linear-gradient(90deg,#38bdf8,#6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.btn:hover {
    transform: translateY(-3px) scale(1.02);
}
.card:hover {
    transform: translateY(-6px);
    border-color: #3b82f6;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="pt-28 pb-16 text-center px-6">
<h1 class="text-5xl font-bold mb-6">
Domu<span class="gradient-text">VPN</span>
</h1>
<p class="text-slate-400 mb-10">
VPN สำหรับ AIS โดยเฉพาะ — เร็ว เสถียร พร้อมใช้ทันที
</p>
</section>

<!-- PRICING -->
<section class="max-w-4xl mx-auto px-6 grid md:grid-cols-2 gap-6 mb-20">

<div class="glass card p-8 rounded-3xl text-center">
<h3 class="text-xl mb-2">Standard</h3>
<div class="text-5xl font-bold mb-4">59</div>

<button onclick="openOrder('standard',59)"
class="btn w-full bg-blue-600 py-3 rounded-xl neon">
ซื้อเลย
</button>
</div>

<div class="glass card p-8 rounded-3xl text-center border border-blue-500 neon">
<h3 class="text-xl mb-2">Duo</h3>
<div class="text-5xl font-bold mb-4">99</div>

<button onclick="openOrder('duo',99)"
class="btn w-full bg-blue-500 py-3 rounded-xl neon">
ซื้อเลย
</button>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
<div class="glass p-8 rounded-3xl w-[90%] max-w-md">

<h2 class="text-2xl mb-4 text-center">แจ้งชำระเงิน</h2>

<img id="qr" class="w-52 mx-auto mb-6"/>

<form id="orderForm" class="space-y-4">

<input type="hidden" name="plan" id="plan">

<input name="name" placeholder="ชื่อ" required
class="w-full p-3 rounded-xl bg-slate-800">

<input name="email" placeholder="Email" required
class="w-full p-3 rounded-xl bg-slate-800">

<input name="contact" placeholder="LINE ID" required
class="w-full p-3 rounded-xl bg-slate-800">

<input type="file" name="slip" required
class="text-sm">

<button id="submitBtn"
class="w-full bg-blue-600 py-3 rounded-xl">
ยืนยัน
</button>

</form>

<div id="success" class="hidden text-center mt-6"></div>

<button onclick="closeModal()" class="mt-4 text-slate-400 w-full">
ปิด
</button>

</div>
</div>

<script>
function openOrder(plan, price){
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('plan').value = plan;
    document.getElementById('qr').src =
    `https://promptpay.io/0943658062/${price}.png`;
}

function closeModal(){
    document.getElementById('modal').classList.add('hidden');
}

// 🔥 SUBMIT ORDER (เชื่อม backend จริง)
document.getElementById('orderForm').onsubmit = async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = 'กำลังส่ง...';

    const formData = new FormData(e.target);

    try {
        const res = await fetch('/api/orders', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        if(data.ok){

            localStorage.setItem('orderId', data.orderId);

            document.getElementById('orderForm').style.display = 'none';

            document.getElementById('success').innerHTML = `
                <div class="text-4xl mb-3">🚀</div>
                <p>${data.message}</p>
                <div class="mt-2 text-sm text-blue-400">
                Order ID: ${data.orderId}
                </div>

                <button onclick="checkStatus()" 
                class="mt-4 bg-blue-600 px-4 py-2 rounded">
                เช็คสถานะ
                </button>
            `;

            document.getElementById('success').classList.remove('hidden');

            startPolling();

        } else {
            alert(data.errors?.join('\n') || data.error);
        }

    } catch {
        alert('server error');
    }

    btn.disabled = false;
    btn.innerText = 'ยืนยัน';
};

// 🔥 CHECK STATUS
async function checkStatus(){
    const id = localStorage.getItem('orderId');

    if(!id) return alert('ไม่พบ order');

    const res = await fetch(`/api/orders/${id}`);
    const data = await res.json();

    if(data.ok){
        alert("สถานะ: " + data.order.status);
    }
}

// 🔥 AUTO CHECK ทุก 10 วิ
function startPolling(){
    setInterval(async ()=>{
        const id = localStorage.getItem('orderId');
        if(!id) return;

        const res = await fetch(`/api/orders/${id}`);
        const data = await res.json();

        if(data.ok && data.order.status === 'provisioned'){
            alert("✅ ได้รับ VPN แล้ว! เช็คอีเมล");
        }
    }, 10000);
}
</script>

</body>
</html>
