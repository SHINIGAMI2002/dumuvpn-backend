<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomuVPN Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Kanit', sans-serif;
    background: #0f172a;
    color: white;
}
.card {
    background: #111827;
    border: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<!-- HEADER -->
<div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
    <div>
        <h1 class="text-3xl font-bold">DomuVPN Admin</h1>
        <p class="text-slate-400 text-sm">จัดการคำสั่งซื้อ</p>
    </div>

    <div class="flex gap-2 w-full md:w-auto">
        <input type="password" id="secret"
        placeholder="ADMIN_SECRET"
        class="bg-slate-800 px-4 py-2 rounded-lg w-full md:w-auto">

        <button onclick="init()"
        class="bg-blue-600 px-5 py-2 rounded-lg font-semibold">
        โหลดข้อมูล
        </button>
    </div>
</div>

<!-- STATS -->
<div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

<!-- STOCK -->
<div class="card p-6 rounded-xl mb-8">
<h2 class="mb-4 font-semibold text-lg">เพิ่ม Config</h2>

<div class="grid md:grid-cols-3 gap-4">
<textarea id="config" placeholder="vless://..."
class="p-3 bg-slate-800 rounded-lg md:col-span-2"></textarea>

<div>
<select id="plan" class="w-full p-3 bg-slate-800 rounded-lg mb-3">
<option value="standard">Standard</option>
<option value="duo">Duo</option>
</select>

<button onclick="addStock()"
class="w-full bg-emerald-600 py-3 rounded-lg font-semibold">
เพิ่ม
</button>
</div>
</div>
</div>

<!-- ORDERS -->
<div class="card rounded-xl overflow-hidden">

<div class="p-4 flex justify-between items-center border-b border-white/5">
<h2 class="font-semibold">Orders</h2>

<select id="filter" onchange="loadOrders()"
class="bg-slate-800 px-3 py-2 rounded-lg text-sm">
<option value="">ทั้งหมด</option>
<option value="pending">pending</option>
<option value="provisioned">approved</option>
<option value="rejected">rejected</option>
</select>
</div>

<div class="overflow-x-auto">
<table class="w-full text-sm">

<thead class="bg-slate-800 text-slate-400">
<tr>
<th class="p-4 text-left">ลูกค้า</th>
<th>Email</th>
<th>Status</th>
<th class="text-center">Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>

</div>

</div>

<!-- SLIP -->
<div id="slipModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
<img id="slipImg" class="max-w-full max-h-full rounded-lg">
</div>

<script>

function getSecret(){
    const s = document.getElementById('secret').value;
    localStorage.setItem('secret', s);
    return s;
}

function init(){
    loadStats();
    loadOrders();
}

async function loadStats(){
    const res = await fetch('/admin/stats',{
        headers:{'x-admin-secret':getSecret()}
    });

    const data = await res.json();

    if(!data.ok) return alert('secret ผิด');

    const s = data.stats;

    document.getElementById('stats').innerHTML = `
        ${box('Pending',s.pending)}
        ${box('Approved',s.provisioned)}
        ${box('Rejected',s.rejected)}
        ${box('Total',s.total)}
    `;
}

function box(name,val){
    return `
    <div class="card p-4 rounded-lg text-center">
        <div class="text-slate-400 text-xs">${name}</div>
        <div class="text-2xl font-bold mt-1">${val}</div>
    </div>`;
}

async function loadOrders(){
    const status = document.getElementById('filter').value;

    const res = await fetch(`/admin/orders?status=${status}`,{
        headers:{'x-admin-secret':getSecret()}
    });

    const data = await res.json();

    document.getElementById('table').innerHTML = data.orders.map(o=>`
    <tr class="border-t border-white/5 hover:bg-white/[0.02]">

        <td class="p-4">
            <div class="font-semibold">${o.name}</div>
            <div class="text-xs text-slate-400">${o.contact || ''}</div>
        </td>

        <td>${o.email}</td>

        <td>
            <span class="text-xs px-2 py-1 rounded 
            ${statusColor(o.status)}">
            ${o.status}
            </span>
        </td>

        <td class="text-center">
            <button onclick="viewSlip('${o.id}')" 
            class="text-slate-400 hover:text-white mr-2">👁</button>

            ${o.status==='pending'?`
            <button onclick="approve('${o.id}')"
            class="bg-emerald-600 px-2 py-1 rounded text-xs mr-1">OK</button>

            <button onclick="reject('${o.id}')"
            class="bg-red-600 px-2 py-1 rounded text-xs">X</button>
            `:''}
        </td>

    </tr>
    `).join('');
}

function statusColor(s){
    if(s==='pending') return 'bg-yellow-500/20 text-yellow-400';
    if(s==='provisioned') return 'bg-green-500/20 text-green-400';
    if(s==='rejected') return 'bg-red-500/20 text-red-400';
}

async function approve(id){
    await fetch(`/admin/approve/${id}?secret=${getSecret()}`,{method:'POST'});
    init();
}

async function reject(id){
    const reason = prompt('เหตุผล:');
    if(!reason) return;
    await fetch(`/admin/reject/${id}?secret=${getSecret()}&reason=${reason}`,{method:'POST'});
    init();
}

async function addStock(){
    const config = document.getElementById('config').value;
    const plan = document.getElementById('plan').value;

    await fetch('/admin/stock/add',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'x-admin-secret':getSecret()
        },
        body:JSON.stringify({plan,config})
    });

    alert('เพิ่มแล้ว');
    loadStats();
}

function viewSlip(id){
    document.getElementById('slipImg').src =
    `/admin/slip/${id}?secret=${getSecret()}`;
    document.getElementById('slipModal').classList.remove('hidden');
}

document.getElementById('slipModal').onclick = ()=>{
    document.getElementById('slipModal').classList.add('hidden');
};

document.getElementById('secret').value = localStorage.getItem('secret') || '';

</script>

</body>
</html>
