<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomuVPN Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Kanit', sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
}
.neon {
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
}
.fade {
    animation: fadeIn .4s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px)}
    to {opacity:1; transform:translateY(0)}
}
</style>
</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Admin Dashboard</h1>

    <div class="flex gap-2">
        <input type="password" id="secret"
        placeholder="ADMIN_SECRET"
        class="bg-slate-800 px-4 py-2 rounded-xl">

        <button onclick="init()"
        class="bg-blue-600 px-4 py-2 rounded-xl neon">
        โหลดข้อมูล
        </button>
    </div>
</div>

<!-- STATS -->
<div id="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>

<!-- STOCK -->
<div class="glass p-6 rounded-2xl mb-8">
<h2 class="mb-4 text-xl">เพิ่ม Config</h2>

<textarea id="config" placeholder="vless://..."
class="w-full p-3 bg-slate-800 rounded-xl mb-3"></textarea>

<select id="plan" class="w-full p-3 bg-slate-800 rounded-xl mb-3">
<option value="standard">Standard</option>
<option value="duo">Duo</option>
</select>

<button onclick="addStock()"
class="bg-emerald-600 px-4 py-2 rounded-xl">
เพิ่ม
</button>
</div>

<!-- ORDERS -->
<div class="glass rounded-2xl overflow-hidden">

<div class="p-4 flex justify-between">
<h2>Orders</h2>

<select id="filter" onchange="loadOrders()"
class="bg-slate-800 px-3 py-2 rounded">
<option value="">ทั้งหมด</option>
<option value="pending">pending</option>
<option value="provisioned">approved</option>
<option value="rejected">rejected</option>
</select>
</div>

<table class="w-full text-sm">
<thead class="bg-slate-800">
<tr>
<th class="p-3">ลูกค้า</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<!-- SLIP MODAL -->
<div id="slipModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
<img id="slipImg" class="max-w-full max-h-full rounded">
</div>

<script>

function getSecret(){
    const s = document.getElementById('secret').value;
    localStorage.setItem('secret', s);
    return s;
}

function init(){
    loadStats();
    loadOrders();
}

async function loadStats(){
    const res = await fetch('/admin/stats',{
        headers:{'x-admin-secret':getSecret()}
    });
    const data = await res.json();

    if(!data.ok) return alert('secret ผิด');

    const s = data.stats;

    document.getElementById('stats').innerHTML = `
        ${card('Pending',s.pending)}
        ${card('Approved',s.provisioned)}
        ${card('Rejected',s.rejected)}
        ${card('Total',s.total)}
        ${card('Stock',s.stockLeft)}
    `;
}

function card(name,val){
    return `
    <div class="glass p-4 rounded-xl text-center fade">
        <div class="text-slate-400 text-xs">${name}</div>
        <div class="text-2xl font-bold">${val}</div>
    </div>`;
}

async function loadOrders(){
    const status = document.getElementById('filter').value;

    const res = await fetch(`/admin/orders?status=${status}`,{
        headers:{'x-admin-secret':getSecret()}
    });

    const data = await res.json();

    const table = document.getElementById('table');

    table.innerHTML = data.orders.map(o=>`
    <tr class="border-t border-white/5">
        <td class="p-3">${o.name}</td>
        <td>${o.email}</td>
        <td>${o.status}</td>
        <td>
            <button onclick="viewSlip('${o.id}')">👁</button>

            ${o.status==='pending'?`
            <button onclick="approve('${o.id}')">✅</button>
            <button onclick="reject('${o.id}')">❌</button>
            `:''}
        </td>
    </tr>
    `).join('');
}

async function approve(id){
    if(!confirm('อนุมัติ?')) return;

    await fetch(`/admin/approve/${id}?secret=${getSecret()}`,{method:'POST'});

    alert('สำเร็จ');
    init();
}

async function reject(id){
    const reason = prompt('เหตุผล:');
    if(!reason) return;

    await fetch(`/admin/reject/${id}?secret=${getSecret()}&reason=${reason}`,{method:'POST'});

    alert('ปฏิเสธแล้ว');
    init();
}

async function addStock(){
    const config = document.getElementById('config').value;
    const plan = document.getElementById('plan').value;

    await fetch('/admin/stock/add',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'x-admin-secret':getSecret()
        },
        body:JSON.stringify({plan,config})
    });

    alert('เพิ่มแล้ว');
    loadStats();
}

function viewSlip(id){
    document.getElementById('slipImg').src = `/admin/slip/${id}?secret=${getSecret()}`;
    document.getElementById('slipModal').classList.remove('hidden');
}

document.getElementById('slipModal').onclick = ()=>{
    document.getElementById('slipModal').classList.add('hidden');
};

// load saved secret
document.getElementById('secret').value = localStorage.getItem('secret') || '';

</script>

</body>
</html>
